<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastrar Carro | São Paulo Customs</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/cadastro_carro.css">
  <script defer src="../java/cadastro_carro.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>São Paulo Customs</h1>
      </div>

      <nav class="main-nav">
        <a href="home_vendedor.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="form-section">
      <div class="container">
        <div class="form-card">
          <h2>Cadastrar veículo</h2>
          <p class="subtitle">Preencha os dados do carro para exibi-lo nas homes da plataforma.</p>

          <form id="form-cadastro-carro" enctype="multipart/form-data">
            <div class="grid">
              <div class="field">
                <label for="marca">Marca</label>
                <input type="text" id="marca" name="marca" required>
              </div>

              <div class="field">
                <label for="modelo">Modelo</label>
                <input type="text" id="modelo" name="modelo" required>
              </div>

              <div class="field">
                <label for="ano">Ano</label>
                <input type="number" id="ano" name="ano" min="1900" max="2100" required>
              </div>

              <div class="field">
                <label for="preco">Preço</label>
                <input type="number" id="preco" name="preco" step="0.01" required>
              </div>

              <div class="field">
                <label for="quilometragem">Quilometragem</label>
                <input type="text" id="quilometragem" name="quilometragem" placeholder="Ex: 25.000 km" required>
              </div>

              <div class="field">
                <label for="cor">Cor</label>
                <input type="text" id="cor" name="cor" required>
              </div>

              <div class="field">
                <label for="combustivel">Combustível</label>
                <select id="combustivel" name="combustivel" required>
                  <option value="">Selecione</option>
                  <option value="Gasolina">Gasolina</option>
                  <option value="Flex">Flex</option>
                  <option value="Diesel">Diesel</option>
                  <option value="Elétrico">Elétrico</option>
                  <option value="Híbrido">Híbrido</option>
                </select>
              </div>

              <div class="field">
                <label for="categoria">Categoria</label>
                <select id="categoria" name="categoria" required>
                  <option value="">Selecione</option>
                  <option value="Sedan">Sedan</option>
                  <option value="Hatch">Hatch</option>
                  <option value="SUV">SUV</option>
                  <option value="Pickup">Pickup</option>
                  <option value="Esportivo">Esportivo</option>
                </select>
              </div>

              <div class="field field-full">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva o veículo..."></textarea>
              </div>

              <div class="field field-full">
                <label for="imagem">Imagem do veículo</label>
                <input type="file" id="imagem" name="imagem" accept="image/*" required>
              </div>
            </div>

            <div class="actions">
              <button type="submit" id="btn-submit">Cadastrar veículo</button>
            </div>

            <p id="mensagem" class="mensagem"></p>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
