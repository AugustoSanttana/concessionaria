<div class="input-group">
  <label for="cpf">CPF</label>
  <input type="text" id="cpf" name="cpf" placeholder="Digite o CPF" required>
</div>

<div class="input-group">
  <label for="telefone">Telefone</label>
  <input type="text" id="telefone" name="telefone" placeholder="Digite o telefone" required>
</div>

<div class="input-group">
  <label for="endereco">Endereço</label>
  <input type="text" id="endereco" name="endereco" placeholder="Digite o endereço" required>
</div>

<div class="input-group">
  <label for="cep">CEP</label>
  <input type="text" id="cep" name="cep" placeholder="Digite o CEP" required>
</div>

<div class="input-group">
  <label for="data_nascimento">Data de nascimento</label>
  <input type="date" id="data_nascimento" name="data_nascimento" required>
</div>

<div class="input-group">
  <label for="codigo_vendedor">Código do vendedor</label>
  <input type="text" id="codigo_vendedor" name="codigo_vendedor" placeholder="Ex: VEND001" required>
</div>

<div class="input-group">
  <label for="comissao_percentual">Comissão (%)</label>
  <input type="number" id="comissao_percentual" name="comissao_percentual" step="0.01" placeholder="Ex: 5" required>
</div>

<div class="input-group">
  <label for="meta_mensal">Meta mensal</label>
  <input type="number" id="meta_mensal" name="meta_mensal" step="0.01" placeholder="Opcional">
</div>

<div class="input-group">
  <label for="gerente_id">ID do gerente</label>
  <input type="number" id="gerente_id" name="gerente_id" placeholder="Opcional">
</div>
